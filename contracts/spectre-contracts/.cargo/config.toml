[build]
target = "riscv64imac-unknown-none-elf"

[target.riscv64imac-unknown-none-elf]
rustflags = ["-C", "target-feature=-a"]

[env]
CC_riscv64_imac_unknown_none_elf = "riscv64-unknown-elf-gcc"
CFLAGS_riscv64_imac_unknown_none_elf = "-march=rv64imc -mabi=lp64 -Os -ffunction-sections -fdata-sections -fno-builtin"
